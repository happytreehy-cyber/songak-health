<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송악고등학교 온라인 보건실 최종본</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 기본 스타일 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f6f9;
            color: #333333;
            line-height: 1.6;
            padding-bottom: 60px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* 1. 최상단 최외곽 글로벌 내비게이션 바 (GNB) */
        .navbar {
            background-color: #ffffff;
            height: 65px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-logo-circle {
            width: 28px;
            height: 28px;
            background-color: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #1e3a8a;
            border: 1px solid #cbd5e1;
            background-image: radial-gradient(#0f75bd 3px, #e2e8f0 4px);
        }
        .nav-title-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-main-title {
            font-size: 17px;
            font-weight: 700;
            color: #1e293b;
        }
        /* GNB 내부 폰트가 얇은 형태의 서브타이틀 */
        .nav-sub-title {
            font-size: 13px;
            color: #64748b;
            font-weight: 400;
            margin-left: 4px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        /* 하늘색 라운드 액션 버튼 */
        .btn-slides {
            background-color: #bae6fd;
            color: #0369a1;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-slides:hover {
            background-color: #7dd3fc;
        }
        .icon-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #64748b;
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 메인 콘텐츠 컨테이너 (정렬 가이드라인) */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 2. 대시보드 2단: 날짜 위젯 + 관리자 로그인 수평 레이아웃 */
        .date-control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px 24px;
        }
        .date-widget-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .date-badge {
            font-family: 'Poppins', sans-serif;
            font-size: 44px;
            font-weight: 700;
            color: #3b82f6;
            line-height: 1;
        }
        .date-info-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .date-full {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
        }
        .calendar-strip {
            display: flex;
            gap: 14px;
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
        }
        .day-item.sunday { color: #ef4444; font-weight: 700; }
        .day-item.today {
            background-color: #1e3a8a;
            color: #ffffff;
            font-weight: 700;
            border-radius: 50%;
            padding: 2px 7px;
            margin: -2px -7px;
        }
        /* 옐로우 계열의 열쇠 아이콘 관리자 버튼 */
        .btn-admin {
            background-color: #fffbeb;
            color: #b45309;
            border: 1px solid #fde68a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-admin:hover {
            background-color: #fef3c7;
        }

        /* 3. 중앙 안내 인트로 배너 카드 */
        .intro-card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 36px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .tag-share {
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
        }
        .main-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e3a8a;
            margin-bottom: 10px;
        }
        .sub-title {
            font-size: 14px;
            color: #475569;
            margin-bottom: 24px;
        }
        .notice-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .notice-box {
            background-color: #f0f9ff;
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13.5px;
            color: #334155;
            font-weight: 500;
            border-left: 4px solid #3b82f6;
        }
        .notice-box i {
            font-size: 16px;
            color: #3b82f6;
        }
        /* 우측 상단 송악고 마크 배치를 고려한 여백 확보 마크 배치 구현 */
        .intro-card::after {
            content: '';
            position: absolute;
            top: 36px;
            right: 36px;
            width: 65px;
            height: 65px;
            background-color: #eab308;
            border-radius: 50%;
            opacity: 0.15;
            background-image: radial-gradient(#ca8a04 4px, transparent 5px);
            background-size: 10px 10px;
        }

        /* 4. 8대 메뉴 플레이트 그리드 구조 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 4px;
        }
        .menu-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 155px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.06);
            border-color: #cbd5e1;
        }
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-num {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #1e3a8a;
        }
        .menu-icon {
            font-size: 18px;
        }
        
        /* 스크린샷 8대 전용 컬러 아이콘 셋업 */
        .icon-01 { color: #3b82f6; }
        .icon-02 { color: #10b981; }
        .icon-03 { color: #f59e0b; }
        .icon-04 { color: #ec4899; }
        .icon-05 { color: #8b5cf6; }
        .icon-06 { color: #06b6d4; }
        .icon-07 { color: #6366f1; }
        .icon-08 { color: #ef4444; }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .text-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 85%;
        }
        .menu-name {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
        }
        .menu-desc {
            font-size: 11px;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .arrow-icon {
            font-size: 12px;
            color: #94a3b8;
            padding-bottom: 2px;
        }

        /* 반응형 뷰포트 분기점 가이드 */
        @media (max-width: 1024px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
        }

            .menu-grid { grid-template-columns
