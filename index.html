<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송악고등학교 온라인 보건실 Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-sky: #4EA7E9;
            --secondary-navy: #1E3A8A;
            --bg-light: #F4F8FA;
            --white: #FFFFFF;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #E2E8F0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .hub-container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--white);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
            padding: 40px 50px;
            margin: 20px 0;
            position: relative;
            flex-grow: 1;
        }

        .view-content { display: flex; flex-direction: column; width: 100%; height: 100%; }
        .sub-view { display: none; }

        /* 상단 헤더 & 로고 */
        .hub-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .school-logo-img { height: 60px; width: auto; object-fit: contain; }
        .logo-area h1 { font-size: 24px; font-weight: 700; color: var(--secondary-navy); }

        .admin-trigger {
            background: #F8FAFC; border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
        }
        .admin-trigger.active { background: #EF4444; color: white; border-color: #EF4444; }

        /* 날짜 UI 블록 */
        .date-section-wrap { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid #f1f5f9; padding-bottom: 20px; }
        
        .info-date-row { display: flex; align-items: center; gap: 15px; }
        .date-big-num { font-size: 56px; font-weight: 700; color: var(--primary-sky); line-height: 1; }
        .date-text-group { text-align: left; }
        .date-text-group .year-month { font-size: 18px; font-weight: 700; color: var(--secondary-navy); }
        .date-text-group .day-name { font-size: 14px; color: var(--text-muted); }

        /* [추가] 가로형 일렬 미니 달력 스타일 */
        .horizontal-mini-calendar { display: flex; flex-direction: column; gap: 6px; background: #F8FAFC; padding: 12px 20px; border-radius: 12px; max-width: 450px; border: 1px solid #E2E8F0; margin-top: 5px; }
        .cal-days-row, .cal-nums-row { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; gap: 10px; }
        .cal-days-row span { font-size: 11px; color: #94A3B8; font-weight: 700; }
        .cal-num-item { font-size: 13px; font-weight: 700; color: #334155; font-family: 'Poppins'; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; }
        .cal-num-item.today-active { background: var(--secondary-navy); color: white; }

        /* 중간 안내 박스 */
        .hero-notice-section {
            background-color: #EDF7FD; border-radius: 16px; border: 1px solid #D2E9F9;
            padding: 30px; margin-bottom: 30px; position: relative;
        }
        .staff-badge {
            display: inline-flex; align-items: center; gap: 6px; background: white;
            padding: 5px 12px; border-radius: 50px; font-size: 12px; font-weight: 700; color: #4a90e2;
            margin-bottom: 15px; border: 1px solid #d1e3ff;
        }
        .hero-title { font-size: 26px; font-weight: 700; color: #2c3e50; margin-bottom: 10px; }
        .hero-desc { font-size: 14px; color: #5d6d7e; margin-bottom: 20px; line-height: 1.6; }
        .hero-logo-right { position: absolute; top: 30px; right: 30px; height: 80px; opacity: 0.9; object-fit: contain; }

        .privacy-notices { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-box {
            background: rgba(255,255,255,0.7); padding: 15px; border-radius: 12px; font-size: 13px;
            display: flex; gap: 10px; border: 1px solid rgba(255,255,255,0.8);
        }
        .p-box i { color: #f39c12; margin-top: 3px; }

        /* 8칸 메뉴 그리드 */
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .menu-box {
            background-color: var(--white); border: 1px solid var(--border-color); border-radius: 20px;
            padding: 24px; height: 180px; position: relative; display: flex; flex-direction: column;
            justify-content: flex-end; transition: 0.2s; cursor: pointer; text-decoration: none; color: inherit;
        }
        .menu-box:hover { transform: translateY(-5px); border-color: var(--primary-sky); box-shadow: 0 10px 25px rgba(78, 167, 233, 0.12); }

        /* 숫자와 이모티콘 나란히 왼쪽 상단 배치 */
        .card-header { position: absolute; top: 22px; left: 24px; display: flex; align-items: center; gap: 8px; }
        .card-num { font-size: 18px; font-weight: 700; color: var(--secondary-navy); font-family: 'Poppins'; }
        .card-emoji { font-size: 20px; }

        .card-title { font-size: 16px; font-weight: 700; color: #0F172A; margin-bottom: 6px; }
        .card-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.4; }

        /* 내부 상세 페이지 */
        .slide-title { font-size: 30px; font-weight: 700; color: var(--secondary-navy); margin-bottom: 25px; padding-left: 18px; border-left: 6px solid var(--primary-sky); }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 25px; font-size: 13px; font-weight: 700;
            color: var(--text-muted); background: white; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer;
        }
        .table-area { width: 100%; border-collapse: collapse; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
        .table-area th { background: #F8FAFC; padding: 15px; text-align: left; font-size: 14px; color: #475569; }
        .table-area td { padding: 15px; border-bottom: 1px solid #F1F5F9; font-size: 14px; }

        /* 하단 파란색 배너 푸터 */
        .footer-banner {
            width: 100%; background-color: #1E4CCB; color: white; padding: 35px 20px;
            text-align: center; display: flex; flex-direction: column; gap: 8px;
        }
        .footer-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
        .footer-sub { font-size: 14px; opacity: 0.8; }

        /* 수정 모드 UI */
        [contenteditable="true"] { border: 2px dashed var(--primary-sky) !important; background-color: #F0F9FF; border-radius: 4px; }
        .save-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1E293B; color: white; padding: 14px 32px; border-radius: 50px; display: none; gap: 20px; align-items: center; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
    </style>
</head>
<body>

    <div class="hub-container">
        
        <div id="main-view" class="view-content">
            <header class="hub-header">
                <div class="logo-area">
                    <img src="LOGO.PNG" alt="송악고 로고" class="school-logo-img" onerror="this.src='https://via.placeholder.com/60?text=LOGO'">
                    <h1 id="edit-main-title" contenteditable="false">송악고등학교 온라인 보건실</h1>
                </div>
                <button class="admin-trigger" onclick="toggleAdmin()">
                    <i class="fa-solid fa-key"></i> <span id="admin-text">관리자 로그인</span>
                </button>
            </header>

            <div class="date-section-wrap">
                <div class="info-date-row">
                    <div class="date-big-num">19</div>
                    <div class="date-text-group">
