<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송악고등학교 온라인 보건실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --blue: #2563c8; --blue-dark: #1a50a8; --blue-light: #e8f0fc; --blue-border: #b8d0f0;
    --gray-bg: #f8fafc; --gray-border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--gray-bg); color: #334155; line-height: 1.6; }
  
  .container { max-w: 1200px; margin: 0 auto; padding: 20px; }
  header { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--gray-border); display: flex; align-items: center; gap: 16px; }
  .header-icon { background: var(--blue-light); color: var(--blue); padding: 12px; border-radius: 12px; font-size: 24px; display: flex; align-items: center; justify-content: center; }
  .header-text h1 { font-size: 22px; font-weight: 700; color: #1e293b; }
  .header-text p { font-size: 13px; color: #64748b; margin-top: 2px; }

  /* 메뉴 탭 바 스크롤 레이아웃 */
  nav { background: white; border-radius: 12px; padding: 8px; margin-bottom: 20px; border: 1px solid var(--gray-border); display: flex; gap: 4px; overflow-x: auto; white-space: nowrap; }
  .nav-item { display: inline-flex; align-items: center; gap: 8px; padding: 12px 16px; font-size: 14px; font-weight: 500; color: #64748b; text-decoration: none; background: none; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .nav-item:hover { background: #f1f5f9; color: #1e293b; }
  .nav-item.active { background: var(--blue-light); color: var(--blue); font-weight: 700; }

  .card { background: white; border-radius: 12px; padding: 24px; border: 1px solid var(--gray-border); margin-bottom: 20px; }
  .card-title { font-size: 16px; font-weight: 700; color: #1e293b; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  
  /* 검색 바 양식 및 드롭다운 스크롤바 */
  .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; background: #f8fafc; padding: 16px; border-radius: 10px; border: 1px solid var(--gray-border); }
  select, input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-family: inherit; background-color: white; color: #334155; }
  select:focus, input:focus, textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,200,0.15); }
  
  .btn { padding: 10px 16px; font-size: 14px; font-weight: 500; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: var(--blue-dark); }

  /* 데이터 테이블 스타일 */
  .table-wrapper { overflow-x: auto; margin-top: 16px; border: 1px solid var(--gray-border); border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
  th { background: #f1f5f9; padding: 12px; font-weight: 600; color: #475569; border-bottom: 1px solid var(--gray-border); }
  td { padding: 12px; border-bottom: 1px solid var(--gray-border); color: #334155; }
  tr:last-child td { border-bottom: none; }
  
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .hidden { display: none !important; }
</style>
</head>
<body>

  <div class="container">
    <header>
      <div class="header-icon"><i class="ti ti-school"></i></div>
      <div class="header-text">
        <h1>송악고등학교 온라인 보건실</h1>
        <p>선생님 전용 스마트 스프레드시트 기반 보건행정 통합 인프라</p>
      </div>
    </header>

    <nav>
      <a href="https://school.smilebogun.org/share" target="_blank" class="nav-item"><i class="ti ti-calendar-event"></i> 1. 오늘의 보건실 ↗</a>
      <a href="https://docs.google.com/" target="_blank" class="nav-item"><i class="ti ti-virus"></i> 2. 학생 감염병 관리 ↗</a>
      <a href="https://docs.google.com/" target="_blank" class="nav-item"><i class="ti ti-heart-handshake"></i> 3. 학생 요보호 관리 ↗</a>
      
      <button onclick="switchTab(this, 'homeroom')" class="nav-item active"><i class="ti ti-users"></i> 4. 담임 협조 요청</button>
      
      <a href="https://docs.google.com/" target="_blank" class="nav-item"><i class="ti ti-book"></i> 5. 보건교육·연수 자료실 ↗</a>
      
      <button onclick="switchTab(this, 'checkup')" class="nav-item"><i class="ti ti-stethoscope"></i> 6. 학생·교직원 검진 안내</button>
      <button onclick="switchTab(this, 'submit')" class="nav-item"><i class="ti ti-upload"></i> 7. 제출·업로드 센터</button>
      <button onclick="switchTab(this, 'faq')" class="nav-item"><i class="ti ti-help"></i> 8. FAQ</button>
    </nav>

    <div class="card">
      <div class="card-title"><i class="ti ti-search" style="color:var(--blue);"></i> 보건실 실시간 이용현황 대장 조회</div>
      <div class="search-grid">
        <select id="search-grade">
          <option value="">학년 선택</option>
          <option value="1">1학년</option>
          <option value="2">2학년</option>
          <option value="3">3학년</option>
        </select>
        
        <select id="search-class">
          <option value="">반 선택 (1~8반)</option>
          <option value="1">1반</option><option value="2">2반</option>
          <option value="3">3반</option><option value="4">4반</option>
          <option value="5">5반</option><option value="6">6반</option>
          <option value="7">7반</option><option value="8">8반</option>
        </select>
        
        <input type="text" id="search-name" placeholder="학생 성명">
        <button onclick="searchSheet()" class="btn btn-primary"><i class="ti ti-search"></i> 실시간 조회</button>
      </div>

      <div class="table-wrapper hidden" id="table-area">
        <table>
          <thead>
            <tr>
              <th>방문일시</th>
              <th>학년/반/성명</th>
              <th>증상 및 호소</th>
              <th>처치내용</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div id="no-data" class="hidden" style="text-align:center; padding:24px; color:#94a3b8; font-size:13px;">일치하는 보건실 이용 기록 데이터가 구글 대장에 존재하지 않습니다.</div>
    </div>

    <div id="tab-homeroom" class="tab-content active card">
      <div style="display:flex; justify-content:between; align-items:center; margin-bottom:16px;">
        <div class="card-title" style="margin:0;"><i class="ti ti-users" style="color:var(--blue);"></i> 4. 담임교사 협조 요청방</div>
        <button onclick="writePost('homeroom')" class="btn btn-primary" style="padding:6px 12px; font-size:12px;">글쓰기</button>
      </div>
      <div id="list-homeroom" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;"></div>
    </div>

    <div id="tab-checkup" class="tab-content card">
      <div style="display:flex; justify-content:between; align-items:center; margin-bottom:16px;">
        <div class="card-title" style="margin:0;"><i class="ti ti-stethoscope" style="color:#10b981;"></i> 6. 학생 및 교직원 검진 안내</div>
        <button onclick="writePost('checkup')" class="btn btn-primary" style="padding:6px 12px; font-size:12px; background:#10b981;">공지추가</button>
      </div>
      <div id="list-checkup" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;"></div>
    </div>

    <div id="tab-submit" class="tab-content card">
      <div class="card-title"><i class="ti ti-upload" style="color:#ef4444;"></i> 7. 증
